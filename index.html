<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Multi-Camera Player</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141e;
    --border: #2a2a3a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.3);
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 44px;
  }

  #header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #segment-info {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Video Grid ── */
  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 2px;
    padding: 2px;
    min-height: 0;
    background: var(--bg);
  }

  .cam-cell {
    position: relative;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cam-cell video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  .cam-label {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.55);
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.3px;
    pointer-events: none;
    z-index: 2;
  }

  .cam-cell .status-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    z-index: 2;
    pointer-events: none;
    transition: background 0.3s;
  }

  .cam-cell.playing .status-dot {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.6);
  }

  /* ── Controls ── */
  #controls {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #timeline-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #time-display {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    min-width: 90px;
    text-align: center;
  }

  #timeline-container {
    flex: 1;
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
    cursor: pointer;
    touch-action: none;
  }

  #timeline-track {
    width: 100%;
    height: 6px;
    background: #2a2a3a;
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }

  #timeline-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
  }

  #timeline-thumb {
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent-glow);
    pointer-events: none;
    transition: left 0.1s linear;
  }

  /* Segment markers on timeline */
  .seg-marker {
    position: absolute;
    top: -2px;
    width: 2px;
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
    pointer-events: none;
  }

  #button-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.05); }
  .ctrl-btn:active { transform: scale(0.96); }

  .ctrl-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    min-width: 100px;
    justify-content: center;
  }

  .ctrl-btn.primary:hover { background: #2563eb; }

  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

  #segment-nav {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Responsive: phone portrait ── */
  @media (max-width: 600px) {
    #grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }
    #header h1 { font-size: 12px; }
    .cam-label { font-size: 10px; }
    #controls { padding: 8px 10px 12px; }
  }

  /* ── Phone landscape ── */
  @media (max-height: 500px) and (orientation: landscape) {
    #header { padding: 4px 12px; min-height: 32px; }
    #header h1 { font-size: 11px; }
    #controls { padding: 4px 12px 8px; gap: 4px; }
    .ctrl-btn { padding: 5px 12px; font-size: 12px; }
    .cam-label { font-size: 9px; top: 3px; left: 4px; }
  }

  /* safe area for notched phones */
  @supports (padding: env(safe-area-inset-bottom)) {
    #controls { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>Multi-Camera Player</h1>
    <span id="segment-info">—</span>
  </div>

  <div id="grid"></div>

  <div id="controls">
    <div id="timeline-row">
      <span id="time-display">00:00 / 00:00</span>
      <div id="timeline-container">
        <div id="timeline-track">
          <div id="timeline-fill"></div>
          <div id="timeline-thumb"></div>
        </div>
      </div>
    </div>
    <div id="button-row">
      <button class="ctrl-btn" id="btn-prev" title="Previous segment">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="btn-play">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
        <span id="play-label">Play</span>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next segment">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2 0V6l6.5 6L8 18zM16 6v12h2V6z"/></svg>
      </button>
      <span id="segment-nav"></span>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION — swap in your own videos here
// ═══════════════════════════════════════════════════════════
const segments = [
  {
    label: "Segment 1 — 00:00–01:00",
    videos: [
      "videos/seg1_cam1.mp4",
      "videos/seg1_cam2.mp4",
      "videos/seg1_cam3.mp4",
      "videos/seg1_cam4.mp4",
      "videos/seg1_cam5.mp4",
      "videos/seg1_cam6.mp4",
    ]
  },
  {
    label: "Segment 2 — 01:00–02:00",
    videos: [
      "videos/seg2_cam1.mp4",
      "videos/seg2_cam2.mp4",
      "videos/seg2_cam3.mp4",
      "videos/seg2_cam4.mp4",
      "videos/seg2_cam5.mp4",
      "videos/seg2_cam6.mp4",
    ]
  }
];

const NUM_CAMS = 6;
const SYNC_THRESHOLD = 0.15; // resync if drift > 150ms

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentSegment = 0;
let isPlaying = false;
let isScrubbing = false;
let videos = [];           // current 6 <video> elements
let primaryVideo = null;   // videos[0] drives the timeline
let segmentDuration = 0;

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
const grid = document.getElementById('grid');
const segInfo = document.getElementById('segment-info');
const segNav = document.getElementById('segment-nav');
const timeDisplay = document.getElementById('time-display');
const timelineFill = document.getElementById('timeline-fill');
const timelineThumb = document.getElementById('timeline-thumb');
const timelineContainer = document.getElementById('timeline-container');
const timelineTrack = document.getElementById('timeline-track');
const btnPlay = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const playLabel = document.getElementById('play-label');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

// ═══════════════════════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════════════════════
function buildGrid() {
  grid.innerHTML = '';
  videos = [];
  for (let i = 0; i < NUM_CAMS; i++) {
    const cell = document.createElement('div');
    cell.className = 'cam-cell';
    cell.innerHTML = `
      <span class="cam-label">Camera ${i + 1}</span>
      <span class="status-dot"></span>
    `;
    const vid = document.createElement('video');
    vid.playsInline = true;
    vid.preload = 'auto';
    vid.muted = true; // needed for autoplay policy
    cell.appendChild(vid);
    grid.appendChild(cell);
    videos.push(vid);
  }
  primaryVideo = videos[0];
}

// ═══════════════════════════════════════════════════════════
// LOAD SEGMENT
// ═══════════════════════════════════════════════════════════
function loadSegment(idx, andPlay = false) {
  if (idx < 0 || idx >= segments.length) return;
  currentSegment = idx;
  const seg = segments[idx];

  segInfo.textContent = seg.label;
  segNav.textContent = `Segment ${idx + 1} / ${segments.length}`;

  // Detach old event listeners by replacing videos
  const wasPlaying = isPlaying;
  pauseAll();

  const readyPromises = [];
  for (let i = 0; i < NUM_CAMS; i++) {
    const vid = videos[i];
    vid.src = seg.videos[i];
    vid.load();
    readyPromises.push(new Promise(resolve => {
      vid.onloadeddata = resolve;
      vid.onerror = resolve; // don't block on error
    }));
  }

  Promise.all(readyPromises).then(() => {
    segmentDuration = primaryVideo.duration || 0;
    updateTimeline(0);
    if (andPlay || wasPlaying) playAll();
  });

  // Segment markers on timeline
  const existingMarkers = timelineTrack.querySelectorAll('.seg-marker');
  existingMarkers.forEach(m => m.remove());
}

// ═══════════════════════════════════════════════════════════
// PLAY / PAUSE / SYNC
// ═══════════════════════════════════════════════════════════
function playAll() {
  isPlaying = true;
  updatePlayButton();
  videos.forEach((v, i) => {
    v.play().catch(() => {});
    v.closest('.cam-cell').classList.add('playing');
  });
}

function pauseAll() {
  isPlaying = false;
  updatePlayButton();
  videos.forEach(v => {
    v.pause();
    v.closest('.cam-cell').classList.remove('playing');
  });
}

function updatePlayButton() {
  iconPlay.style.display = isPlaying ? 'none' : '';
  iconPause.style.display = isPlaying ? '' : 'none';
  playLabel.textContent = isPlaying ? 'Pause' : 'Play';
}

function syncVideos() {
  if (!primaryVideo || !isPlaying) return;
  const t = primaryVideo.currentTime;
  for (let i = 1; i < videos.length; i++) {
    if (Math.abs(videos[i].currentTime - t) > SYNC_THRESHOLD) {
      videos[i].currentTime = t;
    }
  }
}

function seekAll(time) {
  videos.forEach(v => { v.currentTime = time; });
}

// ═══════════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════════
function updateTimeline(time) {
  if (!segmentDuration) return;
  const pct = Math.min(100, (time / segmentDuration) * 100);
  timelineFill.style.width = pct + '%';
  timelineThumb.style.left = pct + '%';
  timeDisplay.textContent = formatTime(time) + ' / ' + formatTime(segmentDuration);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// Primary video drives the timeline
function onTimeUpdate() {
  if (isScrubbing) return;
  updateTimeline(primaryVideo.currentTime);
  syncVideos();
}

// Auto-advance to next segment
function onEnded() {
  if (currentSegment < segments.length - 1) {
    loadSegment(currentSegment + 1, true);
  } else {
    pauseAll();
    // Reset to beginning
    seekAll(0);
    updateTimeline(0);
  }
}

// ═══════════════════════════════════════════════════════════
// SCRUB INTERACTION
// ═══════════════════════════════════════════════════════════
function scrubFromEvent(e) {
  const rect = timelineTrack.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const time = ratio * segmentDuration;
  seekAll(time);
  updateTimeline(time);
}

timelineContainer.addEventListener('pointerdown', (e) => {
  isScrubbing = true;
  scrubFromEvent(e);
  const onMove = (ev) => scrubFromEvent(ev);
  const onUp = () => {
    isScrubbing = false;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
});

// ═══════════════════════════════════════════════════════════
// BUTTON HANDLERS
// ═══════════════════════════════════════════════════════════
btnPlay.addEventListener('click', () => {
  if (isPlaying) pauseAll(); else playAll();
});

btnPrev.addEventListener('click', () => {
  if (currentSegment > 0) loadSegment(currentSegment - 1, isPlaying);
});

btnNext.addEventListener('click', () => {
  if (currentSegment < segments.length - 1) loadSegment(currentSegment + 1, isPlaying);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
  if (e.code === 'ArrowLeft') { seekAll(Math.max(0, primaryVideo.currentTime - 5)); }
  if (e.code === 'ArrowRight') { seekAll(Math.min(segmentDuration, primaryVideo.currentTime + 5)); }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
buildGrid();

// Attach timeupdate + ended to primary video (re-attach on segment load)
const attachPrimaryListeners = () => {
  primaryVideo.addEventListener('timeupdate', onTimeUpdate);
  primaryVideo.addEventListener('ended', onEnded);
};

// Use MutationObserver-like pattern: re-attach after src change
const origLoadSegment = loadSegment;
loadSegment = function(idx, andPlay) {
  primaryVideo.removeEventListener('timeupdate', onTimeUpdate);
  primaryVideo.removeEventListener('ended', onEnded);
  origLoadSegment(idx, andPlay);
  attachPrimaryListeners();
};

attachPrimaryListeners();
loadSegment(0);
</script>
</body>
</html>
