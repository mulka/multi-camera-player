<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Multi-Camera Player</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141e;
    --border: #2a2a3a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.3);
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 44px;
  }

  #header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #segment-info {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Video Grid ── */
  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 2px;
    padding: 2px;
    min-height: 0;
    background: var(--bg);
  }

  .cam-cell {
    position: relative;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cam-cell video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  .cam-label {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.55);
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.3px;
    pointer-events: none;
    z-index: 2;
  }

  .cam-cell .status-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    z-index: 2;
    pointer-events: none;
    transition: background 0.3s;
  }

  .cam-cell.playing .status-dot {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.6);
  }

  .cam-cell.error .status-dot {
    background: #ef4444;
  }

  /* ── Controls ── */
  #controls {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #timeline-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #time-display {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    min-width: 90px;
    text-align: center;
  }

  #timeline-container {
    flex: 1;
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
    cursor: pointer;
    touch-action: none;
  }

  #timeline-track {
    width: 100%;
    height: 6px;
    background: #2a2a3a;
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }

  #timeline-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
  }

  #timeline-thumb {
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent-glow);
    pointer-events: none;
  }

  .seg-marker {
    position: absolute;
    top: -3px;
    width: 1px;
    height: 12px;
    background: rgba(255,255,255,0.25);
    pointer-events: none;
    z-index: 1;
  }

  #button-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.05); }
  .ctrl-btn:active { transform: scale(0.96); }

  .ctrl-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    min-width: 100px;
    justify-content: center;
  }

  .ctrl-btn.primary:hover { background: #2563eb; }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

  #segment-nav {
    font-size: 12px;
    color: var(--text-dim);
  }

  #debug-log {
    position: fixed;
    bottom: 120px;
    left: 8px;
    right: 8px;
    max-height: 100px;
    overflow-y: auto;
    font-size: 10px;
    color: #888;
    background: rgba(0,0,0,0.8);
    padding: 6px;
    border-radius: 4px;
    display: none;
    z-index: 100;
    font-family: monospace;
  }

  /* ── Responsive: phone portrait ── */
  @media (max-width: 600px) {
    #grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }
    #header h1 { font-size: 12px; }
    .cam-label { font-size: 10px; }
    #controls { padding: 8px 10px 12px; }
  }

  /* ── Phone landscape ── */
  @media (max-height: 500px) and (orientation: landscape) {
    #header { padding: 4px 12px; min-height: 32px; }
    #header h1 { font-size: 11px; }
    #controls { padding: 4px 12px 8px; gap: 4px; }
    .ctrl-btn { padding: 5px 12px; font-size: 12px; }
    .cam-label { font-size: 9px; top: 3px; left: 4px; }
  }

  @supports (padding: env(safe-area-inset-bottom)) {
    #controls { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>Multi-Camera Player</h1>
    <span id="segment-info">Loading…</span>
  </div>

  <div id="grid"></div>

  <div id="controls">
    <div id="timeline-row">
      <span id="time-display">--:--:-- --</span>
      <div id="timeline-container">
        <div id="timeline-track">
          <div id="timeline-fill"></div>
          <div id="timeline-thumb"></div>
        </div>
      </div>
    </div>
    <div id="button-row">
      <button class="ctrl-btn" id="btn-prev" title="Previous segment">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="btn-play">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
        <span id="play-label">Play</span>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next segment">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2 0V6l6.5 6L8 18zM16 6v12h2V6z"/></svg>
      </button>
      <span id="segment-nav"></span>
    </div>
  </div>
</div>

<div id="debug-log"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION — swap in your own videos here
// Each segment has a duration (seconds) and 6 video URLs.
// Duration is declared up front so the continuous timeline
// can be built without loading every video.
// ═══════════════════════════════════════════════════════════
// Each segment has a wall-clock start time (ISO 8601 or any
// Date-parseable string), a duration in seconds, and 6 video URLs.
// The timeline is continuous and shows real timestamps.
// Segments don't need to be contiguous — gaps are allowed.
const segments = [
  {
    startTime: "2026-04-21T12:00:00",
    duration: 60,
    videos: [
      "videos/seg1_cam1.mp4",
      "videos/seg1_cam2.mp4",
      "videos/seg1_cam3.mp4",
      "videos/seg1_cam4.mp4",
      "videos/seg1_cam5.mp4",
      "videos/seg1_cam6.mp4",
    ]
  },
  {
    startTime: "2026-04-21T12:01:00",
    duration: 60,
    videos: [
      "videos/seg2_cam1.mp4",
      "videos/seg2_cam2.mp4",
      "videos/seg2_cam3.mp4",
      "videos/seg2_cam4.mp4",
      "videos/seg2_cam5.mp4",
      "videos/seg2_cam6.mp4",
    ]
  }
];

const NUM_CAMS = 6;
const SYNC_THRESHOLD = 0.2;

// ═══════════════════════════════════════════════════════════
// PRECOMPUTE TIMELINE
// The timeline spans from the first segment's start to the
// last segment's end. Playable duration = sum of segment
// durations. segOffsets[i] = playable seconds elapsed before
// segment i starts.
// ═══════════════════════════════════════════════════════════
// Parse wall-clock times (ms since epoch)
for (const seg of segments) {
  seg._startMs = new Date(seg.startTime).getTime();
  seg._endMs = seg._startMs + seg.duration * 1000;
}

// Playable offsets (only counting segment durations, no gaps)
const segOffsets = [];
let totalPlayable = 0;
for (const seg of segments) {
  segOffsets.push(totalPlayable);
  totalPlayable += seg.duration;
}
const totalDuration = totalPlayable;

// Wall-clock boundaries
const timelineStartMs = segments[0]._startMs;
const timelineEndMs = segments[segments.length - 1]._endMs;

// Given a playable time (0 … totalDuration), find segment + local offset
function resolvePlayableTime(pt) {
  pt = Math.max(0, Math.min(totalDuration - 0.001, pt));
  for (let i = segments.length - 1; i >= 0; i--) {
    if (pt >= segOffsets[i]) {
      return { segIndex: i, localTime: pt - segOffsets[i] };
    }
  }
  return { segIndex: 0, localTime: 0 };
}

// Convert playable time → wall-clock Date
function playableToWallClock(pt) {
  const { segIndex, localTime } = resolvePlayableTime(pt);
  return new Date(segments[segIndex]._startMs + localTime * 1000);
}

// Format a Date as HH:MM:SS (12-hour with AM/PM)
function formatWallClock(date) {
  let h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, '0');
  const s = String(date.getSeconds()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m}:${s} ${ampm}`;
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentSegment = -1;  // which segment's videos are loaded
let isPlaying = false;
let isScrubbing = false;
let videos = [];
let segmentLoaded = false;  // true once current segment's videos are ready

// ═══════════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════════
const grid = document.getElementById('grid');
const segInfo = document.getElementById('segment-info');
const segNav = document.getElementById('segment-nav');
const timeDisplay = document.getElementById('time-display');
const timelineFill = document.getElementById('timeline-fill');
const timelineThumb = document.getElementById('timeline-thumb');
const timelineContainer = document.getElementById('timeline-container');
const timelineTrack = document.getElementById('timeline-track');
const btnPlay = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const playLabel = document.getElementById('play-label');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

// ═══════════════════════════════════════════════════════════
// DEBUG (triple-tap header to toggle)
// ═══════════════════════════════════════════════════════════
const debugEl = document.getElementById('debug-log');
let debugOn = false;
let tapCount = 0; let tapTimer = null;
document.getElementById('header').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 500);
  if (tapCount >= 3) { debugOn = !debugOn; debugEl.style.display = debugOn ? 'block' : 'none'; tapCount = 0; }
});
function log(msg) {
  console.log('[MCP]', msg);
  if (!debugOn) return;
  const line = document.createElement('div');
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  debugEl.appendChild(line);
  debugEl.scrollTop = debugEl.scrollHeight;
}

// ═══════════════════════════════════════════════════════════
// BUILD GRID (once)
// ═══════════════════════════════════════════════════════════
function buildGrid() {
  grid.innerHTML = '';
  videos = [];
  for (let i = 0; i < NUM_CAMS; i++) {
    const cell = document.createElement('div');
    cell.className = 'cam-cell';
    cell.innerHTML = `
      <span class="cam-label">Camera ${i + 1}</span>
      <span class="status-dot"></span>
    `;
    const vid = document.createElement('video');
    vid.playsInline = true;
    vid.setAttribute('playsinline', '');
    vid.setAttribute('webkit-playsinline', '');
    vid.preload = 'auto';
    vid.muted = true;
    vid.setAttribute('muted', '');
    cell.appendChild(vid);
    grid.appendChild(cell);
    videos.push(vid);

    vid.addEventListener('error', () => {
      const err = vid.error;
      log(`Cam ${i+1} error: ${err ? err.code + ' ' + err.message : 'unknown'}`);
      cell.classList.add('error');
    });
  }
}

// ═══════════════════════════════════════════════════════════
// BUILD SEGMENT MARKERS ON TIMELINE
// ═══════════════════════════════════════════════════════════
function buildSegmentMarkers() {
  for (let i = 1; i < segments.length; i++) {
    const pct = (segOffsets[i] / totalDuration) * 100;
    const marker = document.createElement('div');
    marker.className = 'seg-marker';
    marker.style.left = pct + '%';
    timelineTrack.appendChild(marker);
  }
}

// ═══════════════════════════════════════════════════════════
// LOAD SEGMENT (only when needed)
// ═══════════════════════════════════════════════════════════
function loadSegment(idx, startLocalTime = 0, andPlay = false) {
  if (idx < 0 || idx >= segments.length) return;
  if (idx === currentSegment && segmentLoaded) {
    seekLocal(startLocalTime);
    if (andPlay && !isPlaying) playAll();
    return;
  }

  log(`Loading segment ${idx + 1} at local ${startLocalTime.toFixed(1)}s`);
  currentSegment = idx;
  segmentLoaded = false;
  const seg = segments[idx];

  const wallStart = formatWallClock(new Date(seg._startMs));
  const wallEnd = formatWallClock(new Date(seg._endMs));
  segInfo.textContent = `${wallStart} — ${wallEnd}`;
  segNav.textContent = `Segment ${idx + 1} / ${segments.length}`;

  const wantPlay = andPlay || isPlaying;
  pauseAll();

  let loadedCount = 0;
  const onReady = () => {
    loadedCount++;
    if (loadedCount >= NUM_CAMS) {
      segmentLoaded = true;
      log(`Segment ${idx + 1} ready`);
      seekLocal(startLocalTime);
      updateTimelineDisplay();
      if (wantPlay) playAll();
    }
  };

  for (let i = 0; i < NUM_CAMS; i++) {
    const vid = videos[i];
    const cell = vid.closest('.cam-cell');
    cell.classList.remove('error', 'playing');
    vid.oncanplaythrough = null;

    vid.src = seg.videos[i];
    vid.currentTime = 0;

    vid.oncanplaythrough = function() {
      vid.oncanplaythrough = null;
      onReady();
    };
    vid.load();
  }
}

function seekLocal(time) {
  time = Math.max(0, time);
  videos.forEach(v => { v.currentTime = time; });
}

// ═══════════════════════════════════════════════════════════
// PLAYABLE TIME HELPERS
// ═══════════════════════════════════════════════════════════
function getPlayableTime() {
  if (currentSegment < 0 || !segmentLoaded) return 0;
  return segOffsets[currentSegment] + (videos[0].currentTime || 0);
}

function seekPlayable(pt) {
  const { segIndex, localTime } = resolvePlayableTime(pt);
  if (segIndex === currentSegment && segmentLoaded) {
    seekLocal(localTime);
    updateTimelineDisplay();
  } else {
    loadSegment(segIndex, localTime, isPlaying);
  }
}

// ═══════════════════════════════════════════════════════════
// PLAY / PAUSE / SYNC
// ═══════════════════════════════════════════════════════════
function playAll() {
  log('playAll()');
  isPlaying = true;
  updatePlayButton();
  videos.forEach((v, i) => {
    const p = v.play();
    v.closest('.cam-cell').classList.add('playing');
    if (p && p.catch) p.catch(err => log(`Cam ${i+1} play err: ${err.message}`));
  });
}

function pauseAll() {
  isPlaying = false;
  updatePlayButton();
  videos.forEach(v => {
    v.pause();
    v.closest('.cam-cell').classList.remove('playing');
  });
}

function updatePlayButton() {
  iconPlay.style.display = isPlaying ? 'none' : '';
  iconPause.style.display = isPlaying ? '' : 'none';
  playLabel.textContent = isPlaying ? 'Pause' : 'Play';
}

function syncVideos() {
  if (!isPlaying || videos.length === 0) return;
  const t = videos[0].currentTime;
  for (let i = 1; i < videos.length; i++) {
    if (Math.abs(videos[i].currentTime - t) > SYNC_THRESHOLD) {
      videos[i].currentTime = t;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// CONTINUOUS TIMELINE — WALL CLOCK DISPLAY
// ═══════════════════════════════════════════════════════════
function updateTimelineDisplay() {
  const pt = getPlayableTime();
  const pct = Math.min(100, (pt / totalDuration) * 100);
  timelineFill.style.width = pct + '%';
  timelineThumb.style.left = pct + '%';

  const currentWall = formatWallClock(playableToWallClock(pt));
  const startWall = formatWallClock(new Date(timelineStartMs));
  const endWall = formatWallClock(new Date(timelineEndMs));
  timeDisplay.textContent = `${currentWall}`;

  // Update header with current wall-clock range
  if (currentSegment >= 0) {
    const seg = segments[currentSegment];
    const localT = videos[0] ? videos[0].currentTime : 0;
    const nowMs = seg._startMs + localT * 1000;
    segInfo.textContent = formatWallClock(new Date(nowMs));
  }
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
function tick() {
  if (isPlaying && !isScrubbing && segmentLoaded) {
    updateTimelineDisplay();
    syncVideos();

    const primary = videos[0];
    if (primary.ended || primary.currentTime >= segments[currentSegment].duration - 0.05) {
      if (currentSegment < segments.length - 1) {
        log('Auto-advancing to next segment');
        loadSegment(currentSegment + 1, 0, true);
      } else {
        pauseAll();
        log('Reached end of all segments');
      }
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ═══════════════════════════════════════════════════════════
// SCRUB (continuous)
// ═══════════════════════════════════════════════════════════
function scrubFromEvent(e) {
  const rect = timelineTrack.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const pt = ratio * totalDuration;
  seekPlayable(pt);
}

timelineContainer.addEventListener('pointerdown', (e) => {
  isScrubbing = true;
  scrubFromEvent(e);
  const onMove = (ev) => { ev.preventDefault(); scrubFromEvent(ev); };
  const onUp = () => {
    isScrubbing = false;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
});

// ═══════════════════════════════════════════════════════════
// BUTTONS
// ═══════════════════════════════════════════════════════════
btnPlay.addEventListener('click', () => {
  if (isPlaying) pauseAll(); else playAll();
});

btnPrev.addEventListener('click', () => {
  const localTime = videos[0] ? videos[0].currentTime : 0;
  if (localTime > 1 && currentSegment >= 0) {
    seekPlayable(segOffsets[currentSegment]);
  } else if (currentSegment > 0) {
    seekPlayable(segOffsets[currentSegment - 1]);
  }
});

btnNext.addEventListener('click', () => {
  if (currentSegment < segments.length - 1) {
    seekPlayable(segOffsets[currentSegment + 1]);
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
  if (e.code === 'ArrowLeft') seekPlayable(getPlayableTime() - 5);
  if (e.code === 'ArrowRight') seekPlayable(getPlayableTime() + 5);
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
buildGrid();
buildSegmentMarkers();
loadSegment(0, 0, false);
log(`Player init: ${segments.length} segments, ${formatWallClock(new Date(timelineStartMs))} — ${formatWallClock(new Date(timelineEndMs))}`);
</script>
</body>
</html>
